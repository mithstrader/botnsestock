name: Deploy Dashboard (Pages)

on:
  push:
    branches: [master]
    paths:
      - "index.html"   # Only rebuild Pages when the dashboard changes
                       # NOT when bots push logs/*.xlsx

  workflow_dispatch:   # Allow manual trigger

permissions:
  contents: read
  pages:    write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."          # Deploy whole repo root (index.html + logs/)

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
