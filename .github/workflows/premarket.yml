name: NSE Pre-Market Scan

on:
  # 9:10 AM IST = 03:40 UTC  (5 min before market open)
  schedule:
    - cron: "40 3 * * 1-5"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  premarket:
    runs-on: ubuntu-latest
    timeout-minutes: 15   # Pre-market scan takes < 5 min

    env:
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      CHAT_ID: ${{ secrets.CHAT_ID }}
      CI: "true"
      EXCEL_FOLDER: "./logs"
      PREMARKET_ONLY: "true"   # Bot runs premarket_scan() and exits

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pre-market scan
        run: python nse_options_bot_stock_cookies_xl_ex_enhanced.py

      - name: Commit pre-open Excel log
        if: always()
        run: |
          git config user.name "NSE Bot"
          git config user.email "nsebot@github-actions"
          git add logs/*.xlsx 2>/dev/null || true
          git diff --cached --quiet && echo "No pre-open data to commit" && exit 0
          git commit -m "logs: pre-market scan $(date +'%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin master
          git push
