name: NSE Options Bot

on:
  # 9:30 AM IST = 04:00 UTC  (after Opening Volatility settles)
  # Bot auto-exits at 3:28 PM IST → total job ~5h58m  (under 6-hour GH limit)
  schedule:
    - cron: "00 4 * * 1-5"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360   # GitHub hard limit — bot exits itself before this

    env:
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      CHAT_ID: ${{ secrets.CHAT_ID }}
      CI: "true"
      EXCEL_FOLDER: "./logs"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run NSE bot (market session)
        env:
          # On manual triggers (workflow_dispatch) run in test mode so it
          # works on weekends / outside market hours for verification
          TEST_MODE: ${{ github.event_name == 'workflow_dispatch' && 'true' || 'false' }}
        run: python nse_options_bot_stock_cookies_xl_ex_enhanced.py

      - name: Commit and push Excel logs to repo
        if: always()
        run: |
          git config user.name "NSE Bot"
          git config user.email "nsebot@github-actions"
          git add logs/*.xlsx 2>/dev/null || true
          git diff --cached --quiet && echo "No new Excel data to commit" && exit 0
          git commit -m "logs: update NSE signals $(date +'%Y-%m-%d')"
          git push
